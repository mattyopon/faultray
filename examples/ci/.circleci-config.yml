# CircleCI template for FaultZero chaos simulation
# Copy this file to your repository as .circleci/config.yml

version: 2.1

executors:
  python:
    docker:
      - image: cimg/python:3.12

jobs:
  faultzero:
    executor: python
    steps:
      - checkout

      - run:
          name: Install FaultZero
          command: pip install faultzero

      - run:
          name: Run Chaos Simulation
          command: |
            faultzero simulate --model infra.yaml --json > results.json
            cat results.json

      - run:
          name: Check for Critical Findings
          command: |
            CRITICAL=$(python3 -c "
            import json, sys
            r = json.load(open('results.json'))
            c = r.get('critical_count', len([x for x in r.get('results', []) if x.get('is_critical')]))
            print(c)
            sys.exit(1 if c > 0 else 0)
            ")
            echo "Critical findings: $CRITICAL"

      - run:
          name: Baseline Comparison
          command: |
            if [ -f baseline.json ]; then
              faultzero simulate --model infra.yaml --baseline baseline.json
            else
              echo "No baseline.json found — skipping comparison."
            fi
          when: always

      - store_artifacts:
          path: results.json
          destination: faultzero-results

workflows:
  version: 2
  test-and-chaos:
    jobs:
      - faultzero
