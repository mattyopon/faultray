# InfraSim - Example infrastructure definition
#
# Load with:
#   infrasim load examples/demo-infra.yaml
#
# This describes a typical web application stack:
#   nginx (load balancer) -> app servers -> PostgreSQL + Redis + RabbitMQ

components:
  - id: nginx
    name: "nginx (LB)"
    type: load_balancer
    host: web01
    port: 443
    replicas: 2
    capacity:
      max_connections: 10000
      max_rps: 50000
    metrics:
      cpu_percent: 25
      memory_percent: 30
      disk_percent: 45

  - id: app-1
    name: "api-server-1"
    type: app_server
    host: app01
    port: 8080
    replicas: 1
    capacity:
      max_connections: 500
      connection_pool_size: 100
      timeout_seconds: 30
    metrics:
      cpu_percent: 65
      memory_percent: 70
      disk_percent: 55
      network_connections: 450

  - id: app-2
    name: "api-server-2"
    type: app_server
    host: app02
    port: 8080
    replicas: 1
    capacity:
      max_connections: 500
      connection_pool_size: 100
      timeout_seconds: 30
    metrics:
      cpu_percent: 60
      memory_percent: 68
      disk_percent: 55
      network_connections: 420

  - id: postgres
    name: "PostgreSQL (primary)"
    type: database
    host: db01
    port: 5432
    replicas: 1
    capacity:
      max_connections: 100
      max_disk_gb: 500
    metrics:
      cpu_percent: 45
      memory_percent: 80
      disk_percent: 72
      network_connections: 90

  - id: redis
    name: "Redis (cache)"
    type: cache
    host: cache01
    port: 6379
    replicas: 1
    capacity:
      max_connections: 10000
    metrics:
      cpu_percent: 15
      memory_percent: 60
      network_connections: 200

  - id: rabbitmq
    name: "RabbitMQ"
    type: queue
    host: mq01
    port: 5672
    replicas: 1
    capacity:
      max_connections: 1000
    metrics:
      cpu_percent: 20
      memory_percent: 40
      disk_percent: 35
      network_connections: 50

dependencies:
  - source: nginx
    target: app-1
    type: requires
    weight: 1.0

  - source: nginx
    target: app-2
    type: requires
    weight: 1.0

  - source: app-1
    target: postgres
    type: requires
    weight: 1.0

  - source: app-2
    target: postgres
    type: requires
    weight: 1.0

  - source: app-1
    target: redis
    type: optional
    weight: 0.7

  - source: app-2
    target: redis
    type: optional
    weight: 0.7

  - source: app-1
    target: rabbitmq
    type: async
    weight: 0.5

  - source: app-2
    target: rabbitmq
    type: async
    weight: 0.5
