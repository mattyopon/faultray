name: 'FaultRay Terraform Guard'
description: >
  Analyze a Terraform plan JSON for resilience impact.
  Acts as a safety net — surfaces risks before infrastructure changes reach production.
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  plan-file:
    description: >
      Path to the Terraform plan JSON file produced by
      `terraform show -json plan.out`.
    required: true

  min-score:
    description: >
      Minimum acceptable resilience score (0-100).
      The check fails if the post-change score falls below this value.
    required: false
    default: '60'

  fail-on-regression:
    description: >
      Fail the check when the resilience score drops by more than 5 points
      compared to the stored baseline, even if it is still above min-score.
      Set to 'false' to disable regression detection.
    required: false
    default: 'true'

  comment-on-pr:
    description: >
      Post a detailed analysis comment on the pull request.
      Requires the workflow to have `pull-requests: write` permission.
    required: false
    default: 'true'

  baseline-file:
    description: >
      Path to a JSON file containing the baseline resilience score
      (e.g. `{"resilience_score": 75}`). Used for regression detection.
      Leave empty to skip regression comparison.
    required: false
    default: ''

  faultray-version:
    description: >
      Specific FaultRay version to install (e.g. `0.4.2`).
      Leave empty to install the latest published release.
    required: false
    default: ''

outputs:
  resilience-score:
    description: 'Post-change resilience score (0-100).'
    value: ${{ steps.run-faultray.outputs.resilience_score }}

  baseline-score:
    description: 'Baseline resilience score loaded from baseline-file (or "N/A").'
    value: ${{ steps.run-faultray.outputs.baseline_score }}

  recommendation:
    description: 'Recommendation string: safe | review | high-risk'
    value: ${{ steps.run-faultray.outputs.recommendation }}

  new-risks-count:
    description: 'Number of new resilience risks introduced by this change.'
    value: ${{ steps.run-faultray.outputs.new_risks_count }}

  resolved-risks-count:
    description: 'Number of existing risks resolved by this change.'
    value: ${{ steps.run-faultray.outputs.resolved_risks_count }}

  critical-count:
    description: 'Number of critical findings in the analysis.'
    value: ${{ steps.run-faultray.outputs.critical_count }}

  passed:
    description: "'true' if all gate checks passed, 'false' otherwise."
    value: ${{ steps.gate.outputs.passed }}

runs:
  using: composite
  steps:

    # ── 1. Install FaultRay ────────────────────────────────────────────────
    - name: Install FaultRay
      shell: bash
      run: |
        if [ -n "${{ inputs.faultray-version }}" ]; then
          pip install "faultray==${{ inputs.faultray-version }}"
        else
          pip install faultray
        fi

    # ── 2. Validate plan file ──────────────────────────────────────────────
    - name: Validate plan file
      shell: bash
      run: |
        PLAN_FILE="${{ inputs.plan-file }}"
        if [ ! -f "$PLAN_FILE" ]; then
          echo "::error::Plan file not found: $PLAN_FILE"
          echo "Ensure you ran: terraform plan -out=plan.out && terraform show -json plan.out > plan.json"
          exit 1
        fi
        echo "Plan file found: $PLAN_FILE"

    # ── 3. Run FaultRay analysis ───────────────────────────────────────────
    - name: Run FaultRay tf-check
      id: run-faultray
      shell: bash
      run: |
        set -euo pipefail

        PLAN_FILE="${{ inputs.plan-file }}"
        BASELINE_FILE="${{ inputs.baseline-file }}"
        RESULTS_FILE="/tmp/faultray-tf-action-results.json"

        # Run analysis (capture exit; we handle pass/fail ourselves)
        faultray tf-check "$PLAN_FILE" --json > "$RESULTS_FILE" 2>/tmp/faultray-tf-stderr.txt || true

        if [ -s /tmp/faultray-tf-stderr.txt ]; then
          echo "--- FaultRay output ---"
          cat /tmp/faultray-tf-stderr.txt
          echo "-----------------------"
        fi

        python3 << PYEOF
        import json, sys, os

        out = os.environ.get("GITHUB_OUTPUT", "/dev/null")
        rf  = "/tmp/faultray-tf-action-results.json"
        bf  = "$BASELINE_FILE"

        try:
          r = json.load(open(rf))
        except Exception as e:
          print(f"Warning: could not parse results ({e}). Using defaults.", file=sys.stderr)
          r = {}

        score    = r.get("resilience_score", 0)
        rec      = r.get("recommendation", "review")
        new_r    = r.get("new_risks", [])
        res_r    = r.get("resolved_risks", [])
        changes  = r.get("resource_changes", {})
        critical = r.get("critical_count", 0)
        warnings = r.get("warning_count", 0)

        baseline_score = "N/A"
        if bf and os.path.isfile(bf):
          try:
            b = json.load(open(bf))
            baseline_score = str(b.get("resilience_score", "N/A"))
          except Exception as e:
            print(f"Warning: could not read baseline: {e}", file=sys.stderr)

        with open(out, "a") as f:
          f.write(f"resilience_score={score}\n")
          f.write(f"recommendation={rec}\n")
          f.write(f"new_risks_count={len(new_r)}\n")
          f.write(f"resolved_risks_count={len(res_r)}\n")
          f.write(f"critical_count={critical}\n")
          f.write(f"warning_count={warnings}\n")
          f.write(f"baseline_score={baseline_score}\n")
          f.write(f"added={changes.get('added', 0)}\n")
          f.write(f"changed={changes.get('changed', 0)}\n")
          f.write(f"destroyed={changes.get('destroyed', 0)}\n")

        print(f"Resilience score:  {score}/100")
        print(f"Baseline:          {baseline_score}")
        print(f"Recommendation:    {rec}")
        print(f"New risks:         {len(new_r)}")
        print(f"Risks resolved:    {len(res_r)}")
        print(f"Critical:          {critical}")
        PYEOF

    # ── 4. Evaluate pass/fail gate ─────────────────────────────────────────
    - name: Evaluate resilience gate
      id: gate
      shell: bash
      run: |
        set -euo pipefail

        SCORE="${{ steps.run-faultray.outputs.resilience_score }}"
        BASELINE="${{ steps.run-faultray.outputs.baseline_score }}"
        MIN_SCORE="${{ inputs.min-score }}"
        FAIL_ON_REGRESSION="${{ inputs.fail-on-regression }}"
        CRITICAL="${{ steps.run-faultray.outputs.critical_count }}"

        PASSED=true
        FAIL_MSG=""

        if python3 -c "import sys; sys.exit(0 if float('$SCORE') < float('$MIN_SCORE') else 1)" 2>/dev/null; then
          PASSED=false
          FAIL_MSG="Score ${SCORE}/100 is below minimum threshold of ${MIN_SCORE}"
        fi

        if [ "$CRITICAL" -gt 0 ]; then
          PASSED=false
          SEP=""
          [ -n "$FAIL_MSG" ] && SEP="; "
          FAIL_MSG="${FAIL_MSG}${SEP}${CRITICAL} critical resilience finding(s) detected"
        fi

        if [ "$FAIL_ON_REGRESSION" = "true" ] && [ "$BASELINE" != "N/A" ]; then
          REGRESSION=$(python3 -c "
        try:
          print('true' if float('$SCORE') < float('$BASELINE') - 5 else 'false')
        except Exception:
          print('false')
        " 2>/dev/null || echo "false")
          if [ "$REGRESSION" = "true" ]; then
            PASSED=false
            SEP=""
            [ -n "$FAIL_MSG" ] && SEP="; "
            FAIL_MSG="${FAIL_MSG}${SEP}Score regressed from ${BASELINE} to ${SCORE} (more than 5-point drop)"
          fi
        fi

        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "fail_reason=$FAIL_MSG" >> $GITHUB_OUTPUT

        if [ "$PASSED" = "true" ]; then
          echo "FaultRay Terraform Guard: PASSED (score=${SCORE}/100)"
        else
          echo "FaultRay Terraform Guard: FAILED - $FAIL_MSG"
        fi

    # ── 5. Post PR comment ─────────────────────────────────────────────────
    - name: Post PR comment
      if: inputs.comment-on-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          const score      = parseInt('${{ steps.run-faultray.outputs.resilience_score }}') || 0;
          const baseline   = '${{ steps.run-faultray.outputs.baseline_score }}';
          const passed     = '${{ steps.gate.outputs.passed }}' === 'true';
          const failReason = '${{ steps.gate.outputs.fail_reason }}';
          const recommend  = '${{ steps.run-faultray.outputs.recommendation }}' || 'review';
          const newRisks   = parseInt('${{ steps.run-faultray.outputs.new_risks_count }}') || 0;
          const resolved   = parseInt('${{ steps.run-faultray.outputs.resolved_risks_count }}') || 0;
          const critical   = parseInt('${{ steps.run-faultray.outputs.critical_count }}') || 0;
          const warnings   = parseInt('${{ steps.run-faultray.outputs.warning_count }}') || 0;
          const added      = parseInt('${{ steps.run-faultray.outputs.added }}') || 0;
          const changed    = parseInt('${{ steps.run-faultray.outputs.changed }}') || 0;
          const destroyed  = parseInt('${{ steps.run-faultray.outputs.destroyed }}') || 0;
          const minScore   = parseInt('${{ inputs.min-score }}') || 60;
          const planFile   = '${{ inputs.plan-file }}';

          const scoreEmoji = score >= 80 ? '\u{1F7E2}' : score >= 60 ? '\u{1F7E1}' : '\u{1F534}';
          const scoreTrend = (() => {
            if (baseline === 'N/A') return '';
            const b = parseFloat(baseline);
            const diff = score - b;
            if (Math.abs(diff) < 1) return ' *(unchanged vs baseline)*';
            const arrow = diff > 0 ? '\u25B2' : '\u25BC';
            const sign  = diff > 0 ? '+' : '';
            return ' *(' + arrow + ' ' + sign + diff.toFixed(0) + ' vs baseline ' + b + ')*';
          })();

          const statusBadge = passed
            ? '### \u2705 PASS \u2014 Resilience check succeeded'
            : '### \u274C FAIL \u2014 Resilience check failed';

          const recommendMap = {
            'safe':      '\u2705 **Safe to merge** \u2014 no significant resilience impact detected.',
            'review':    '\u26A0\uFE0F **Review recommended** \u2014 some resilience concerns warrant attention.',
            'high-risk': '\uD83D\uDEA8 **High risk** \u2014 do not merge without explicit infrastructure owner sign-off.',
          };
          const recommendText = recommendMap[recommend] || recommendMap['review'];

          let newRiskRows  = '';
          let resolvedRows = '';
          try {
            const raw = JSON.parse(fs.readFileSync('/tmp/faultray-tf-action-results.json', 'utf8'));
            if (Array.isArray(raw.new_risks) && raw.new_risks.length > 0) {
              newRiskRows = raw.new_risks.map(r =>
                '| `' + (r.resource || '\u2014') + '` | ' + (r.severity || '\u2014') + ' | ' + (r.description || '\u2014') + ' |'
              ).join('\n');
            }
            if (Array.isArray(raw.resolved_risks) && raw.resolved_risks.length > 0) {
              resolvedRows = raw.resolved_risks.map(r =>
                '| `' + (r.resource || '\u2014') + '` | ' + (r.description || '\u2014') + ' |'
              ).join('\n');
            }
          } catch (_) { /* results absent */ }

          const baselineDisplay = baseline === 'N/A'
            ? '*no baseline \u2014 first analysis*'
            : baseline + ' / 100';

          let body = '';
          body += '\uD83D\uDEE1\uFE0F FaultRay Terraform Guard\n';
          body += '<!-- FaultRay Terraform Guard marker -->\n\n';
          body += statusBadge + '\n\n';
          body += '### Resilience Score\n\n';
          body += '| | |\n|:--|:--|\n';
          body += '| **Score** | ' + scoreEmoji + ' **' + score + ' / 100**' + scoreTrend + ' |\n';
          body += '| **Minimum threshold** | ' + minScore + ' / 100 |\n';
          body += '| **Baseline** | ' + baselineDisplay + ' |\n\n';
          body += '### Infrastructure Changes\n\n';
          body += '| | Count |\n|:--|:--|\n';
          body += '| \u2795 Added | `' + added + '` |\n';
          body += '| \u270F\uFE0F Modified | `' + changed + '` |\n';
          body += '| \uD83D\uDDD1\uFE0F Destroyed | `' + destroyed + '` |\n\n';
          body += '### Resilience Findings\n\n';
          body += '| Severity | Count |\n|:--|:--|\n';
          body += '| \uD83D\uDD34 Critical | `' + critical + '` |\n';
          body += '| \uD83D\uDFE1 Warning | `' + warnings + '` |\n';
          body += '| \uD83C\uDD95 New risks introduced | `' + newRisks + '` |\n';
          body += '| \u2714\uFE0F Risks resolved | `' + resolved + '` |\n\n';

          if (newRiskRows) {
            body += '<details>\n<summary><strong>New risks introduced (' + newRisks + ')</strong></summary>\n\n';
            body += '| Resource | Severity | Description |\n|:--|:--|:--|\n' + newRiskRows + '\n\n</details>\n\n';
          }
          if (resolvedRows) {
            body += '<details>\n<summary><strong>Risks resolved by this change (' + resolved + ')</strong></summary>\n\n';
            body += '| Resource | Description |\n|:--|:--|\n' + resolvedRows + '\n\n</details>\n\n';
          }

          body += '### Recommendation\n\n' + recommendText + '\n\n';

          if (!passed && failReason) {
            body += '> [!CAUTION]\n> **Why this check failed:** ' + failReason + '\n\n';
          }

          body += '---\n';
          body += '*Plan: `' + planFile + '`'
               + ' \u00B7 [FaultRay](https://github.com/faultray/faultray) Terraform Guard'
               + ' \u00B7 [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*';

          const MARKER = 'FaultRay Terraform Guard marker';
          const { data: allComments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = allComments.find(c => c.body && c.body.includes(MARKER));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              comment_id: existing.id,
              body,
            });
            core.info('Updated existing comment id: ' + existing.id);
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            core.info('Created new PR comment.');
          }

    # ── 6. Enforce gate result ─────────────────────────────────────────────
    - name: Enforce gate result
      if: steps.gate.outputs.passed != 'true'
      shell: bash
      run: |
        echo "::error title=FaultRay Terraform Guard::FAILED - ${{ steps.gate.outputs.fail_reason }}"
        exit 1
