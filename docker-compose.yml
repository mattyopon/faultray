services:
  faultray:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FAULTRAY_DB_PATH=/data/faultray.db
      # Set specific origins for production, e.g. https://your-domain.com
      # - FAULTRAY_CORS_ORIGINS=https://your-domain.com
    volumes:
      - faultray-data:/data
      - ./examples:/app/examples:ro
    command: ["faultray", "serve", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

  demo:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FAULTRAY_DB_PATH=/data/faultray.db
      # Set specific origins for production, e.g. https://your-domain.com
      # - FAULTRAY_CORS_ORIGINS=https://your-domain.com
    volumes:
      - faultray-data:/data
    command: ["faultray", "demo", "--web"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    profiles:
      - demo

  cli:
    build: .
    volumes:
      - faultray-data:/data
      - ./examples:/app/examples
      - ./reports:/app/reports
    entrypoint: ["faultray"]
    command: ["--help"]
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    profiles:
      - cli

volumes:
  faultray-data:
