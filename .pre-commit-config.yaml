repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--ignore-missing-imports]
  # #136: refuse to commit .env / .env.* files outright. .env.example is
  # tracked as a template and stays allowed. (Content-level scanning is
  # out of scope; this hook only catches the filename, which covers the
  # specific regression #136 was filed against.)
  - repo: local
    hooks:
      - id: forbid-env-files
        name: forbid committing .env files
        entry: bash -c 'echo ".env / .env.* files must not be committed (#136). Move secrets to a vault and commit only .env.example."; exit 1'
        language: system
        files: '^\.env(\.(?!example$)[^/]+)?$'
        pass_filenames: false
