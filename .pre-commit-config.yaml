repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with the ruff version pinned in pyproject.toml [dev]
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        # Same type stubs as CI so pre-commit and CI agree
        additional_dependencies:
          - types-PyYAML>=6.0
          - types-networkx>=3.0
        args: [--ignore-missing-imports]
