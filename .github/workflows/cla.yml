name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Comment triggers only fire on PR comments (not plain issues), and the
        # third-party action is pinned to an immutable commit SHA to remove the
        # floating-tag supply-chain risk on this write-capable workflow.
        if: |
          (github.event_name == 'issue_comment'
            && github.event.issue.pull_request
            && (github.event.comment.body == 'recheck'
                || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08  # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/${{ github.repository }}/blob/main/CLA.md"
          branch: "main"
          allowlist: dependabot[bot],github-actions[bot],devin-ai-integration[bot]
          custom-notsigned-prcomment: >
            Thank you for your contribution to FaultRay! Before we can merge this PR,
            we need you to sign the Contributor License Agreement (CLA).
            Please read the [CLA document](https://github.com/${{ github.repository }}/blob/main/CLA.md)
            and reply with the following comment to agree:


            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
