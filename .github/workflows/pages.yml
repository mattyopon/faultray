name: Deploy Landing Page

# The landing page lives in landing/ (there is no site/ directory; the
# old path made the push trigger dead and manual runs fail on upload).
on:
  push:
    branches: [main]
    paths: ['landing/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: landing
      - id: deployment
        uses: actions/deploy-pages@v5
