name: AI Code Review (PR-Agent)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-agent:
    # Only run on PRs, or on a "/review" comment FROM a trusted author
    # (owner/member/collaborator) on a PR — never an arbitrary commenter, which
    # would let anyone drive this secret-bearing (OPENAI_API_KEY) job.
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/review') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Codium-ai/pr-agent@d82f7d3e696cd00822694aaa3096265d3889f3f1  # main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: "/review"
