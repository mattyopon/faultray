name: FaultRay Infrastructure Check

on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
      - '**/terraform/**'
      - '**/*.tf'

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: faultray-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  faultray-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          # This job runs untrusted PR code (pip install -e .); do not leave the
          # checkout token in .git/config where that code could read it.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install FaultRay
        # Install the checked-out code under review, not a published build,
        # so the gate actually validates the PR's changes.
        run: pip install -e .

      - name: Find infrastructure YAML files
        id: find-yaml
        run: |
          set -euo pipefail
          # Find FaultRay infrastructure YAML files in the PR (one path, quoted).
          FIRST_FILE=$(find . -name 'faultray*.yaml' -o -name 'faultray*.yml' -o -name 'infrastructure*.yaml' | head -n1)
          if [ -z "$FIRST_FILE" ]; then
            echo "No FaultRay YAML files found"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            # Reject paths with control/whitespace chars so a crafted filename
            # cannot inject extra $GITHUB_OUTPUT lines or break the consumer.
            case "$FIRST_FILE" in
              *[$' \t\n\r']*) echo "Unsafe filename; skipping" >&2; echo "found=false" >> "$GITHUB_OUTPUT" ;;
              *) echo "found=true" >> "$GITHUB_OUTPUT"; echo "first_file=$FIRST_FILE" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Run FaultRay simulation
        if: steps.find-yaml.outputs.found == 'true'
        env:
          # Pass the step output via env and reference it quoted; never
          # interpolate ${{ steps.*.outputs.* }} into a run: shell block.
          FILE: ${{ steps.find-yaml.outputs.first_file }}
        run: |
          set -euo pipefail
          echo "Running FaultRay on $FILE..."

          # Run simulation with JSON output
          faultray load "$FILE"
          faultray simulate --json faultray-results.json 2>&1 | tee faultray-output.txt

          # Run AI analysis
          faultray analyze "$FILE" --json 2>&1 | tee faultray-analysis.txt

      - name: Comment PR with results
        if: steps.find-yaml.outputs.found == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            let output = '';
            try { output = fs.readFileSync('faultray-output.txt', 'utf8'); } catch(e) {}
            let analysis = '';
            try { analysis = fs.readFileSync('faultray-analysis.txt', 'utf8'); } catch(e) {}

            // Parse key metrics from output
            const lines = output.split('\n');
            const resilienceLine = lines.find(l => l.includes('Resilience'));
            const criticalLine = lines.find(l => l.includes('CRITICAL') || l.includes('Critical'));

            const body = `## FaultRay Chaos Simulation Report

            ${resilienceLine ? '**' + resilienceLine.trim() + '**' : ''}
            ${criticalLine ? criticalLine.trim() : ''}

            <details>
            <summary>Full Simulation Output</summary>

            \`\`\`
            ${output.substring(0, 3000)}
            \`\`\`
            </details>

            <details>
            <summary>AI Analysis & Recommendations</summary>

            \`\`\`
            ${analysis.substring(0, 3000)}
            \`\`\`
            </details>

            ---
            *Powered by [FaultRay](https://github.com/mattyopon/faultray) -- Zero-Risk Infrastructure Chaos Simulation*`;

            // Find existing FaultRay comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.body.includes('FaultRay Chaos Simulation Report'));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
